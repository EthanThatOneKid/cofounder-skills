name: Nightly Cofounder source scrape

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Cofounder sources
        run: python scripts/sync_cofounder_sources.py

      - name: Validate generated manifest
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("Skills/cofounder/references/upstream/manifest.json").read_text())
          count = manifest.get("count", 0)
          if count < 10:
              raise SystemExit(f"Expected at least 10 scraped documents, got {count}")
          for item in manifest["items"]:
              path = Path("Skills/cofounder/references/upstream") / item["path"]
              if not path.exists():
                  raise SystemExit(f"Missing generated file: {path}")
              if not path.read_text().strip():
                  raise SystemExit(f"Generated file is empty: {path}")
          print(f"Validated {count} scraped documents.")
          PY

      - name: Commit scrape changes
        run: |
          if git diff --quiet --exit-code; then
            echo "No scrape changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Skills/cofounder/references/upstream
          git commit -m "Update Cofounder upstream scrapes"
          git push
